<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Video Player</title>
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/261d4f1134.js"
      crossorigin="anonymous"
    ></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; }
        .video-container { margin-top: 50px; background: #000; border-radius: 8px; overflow: hidden; line-height: 0; }
        video { width: 640px; height: auto; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin: 0 5px; }
        button:hover { background: #0056b3; }
    </style>
    
</head>
<body>
    <div id="portfolioHeader">
      <div class="container">
        <nav>
          <img src="images/logo.png" class="logo" />
          <ul id="sidemenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="prototype.html">HCI/UX Prototype</a></li>
            <li><a href="#contact">Contact</a></li>
            <i class="fas fa-times" onClick="closemenu()"></i>
          </ul>
          <i class="fas fa-bars" onClick="openmenu()"></i>
        </nav>
      </div>
    </div>

    <div class="video-container">
        <video id="myVideo">
            <source src="yuka_ar_prototype.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="controls">
        <button onclick="playVideo()">PLAY</button>
        <button onclick="pauseVideo()">STOP</button>
    </div>

    <script>
        const video = document.getElementById("myVideo");

        function playVideo() {
            video.play();
        }

        function pauseVideo() {
            video.pause();
        }
    </script>
</body>
<script src="script.js"></script>
</html>
